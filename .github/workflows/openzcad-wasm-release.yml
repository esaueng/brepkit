name: Build OpenZCAD WASM Candidate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Build fork package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.62.30
        with:
          tool: wasm-pack

      - name: Build and validate WASM package
        run: cargo xtask wasm-build --skip-opt

      - name: Stamp fork provenance
        working-directory: crates/wasm/pkg
        run: |
          npm pkg set \
            repository.type=git \
            repository.url=git+https://github.com/esaueng/brepkit.git \
            homepage=https://github.com/esaueng/brepkit \
            brepkitSourceCommit="$GITHUB_SHA"

      - name: Pack npm-compatible artifact
        id: pack
        working-directory: crates/wasm/pkg
        run: |
          package_name=$(npm pack --pack-destination "$RUNNER_TEMP")
          echo "path=$RUNNER_TEMP/$package_name" >> "$GITHUB_OUTPUT"
          echo "name=$package_name" >> "$GITHUB_OUTPUT"

      - name: Upload validation artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.pack.outputs.name }}
          path: ${{ steps.pack.outputs.path }}
          if-no-files-found: error
