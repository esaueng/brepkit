name: Build OpenZCAD WASM Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Build fork package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.62.30
        with:
          tool: wasm-pack

      - name: Build and validate WASM package
        run: cargo xtask wasm-build --skip-opt

      - name: Pack npm-compatible artifact
        id: pack
        working-directory: crates/wasm/pkg
        run: |
          package_name=$(npm pack --pack-destination "$RUNNER_TEMP")
          echo "path=$RUNNER_TEMP/$package_name" >> "$GITHUB_OUTPUT"
          echo "name=$package_name" >> "$GITHUB_OUTPUT"

      - name: Create immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_PATH: ${{ steps.pack.outputs.path }}
        run: |
          release_tag="openzcad-${GITHUB_SHA::12}"
          gh release create "$release_tag" "$PACKAGE_PATH" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "OpenZCAD WASM ${GITHUB_SHA::12}" \
            --notes "Browser WASM package built from esaueng/brepkit commit $GITHUB_SHA for reproducible OpenZCAD consumption."
