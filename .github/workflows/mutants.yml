name: Mutation Testing

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  mutants:
    name: Cargo Mutants
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.62.30
        with:
          tool: nextest
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --version 27.0.0 --locked
      - name: Run mutation testing on critical modules
        run: |
          cargo mutants \
            --test-tool=nextest \
            --timeout=120 \
            --package brepkit-math \
            --package brepkit-algo \
            -e 'tests/**' \
            -e 'benches/**' \
            -e 'examples/**' \
            --output=mutants-output
      - name: Publish mutation summary
        if: always()
        run: |
          {
            echo "## Mutation testing"
            echo
            echo "| Outcome | Count |"
            echo "| --- | ---: |"
            for outcome in caught missed timeout unviable; do
              file="mutants-output/${outcome}.txt"
              if [ -f "$file" ]; then
                count=$(wc -l < "$file" | tr -d ' ')
              else
                count=0
              fi
              echo "| ${outcome} | ${count} |"
            done
            echo
            echo "Missed and timed-out mutants fail the cargo-mutants step and must be reviewed in the attached report."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutants-report
          path: mutants-output/
          retention-days: 30
